<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topan — Tipografia Fonte Única</title>
<link rel="stylesheet" href="https://use.typekit.net/uyh8pui.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400&family=Plus+Jakarta+Sans:wght@300;400&family=DM+Sans:wght@300;400&family=Jost:wght@300;400&family=Cormorant+Garamond:wght@300;400&display=swap">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #F9F8F6;
  color: #111;
  font-family: sans-serif;
  padding: 32px;
  transition: background 0.3s, color 0.3s;
}
body.dark { background: #111; color: #F9F8F6; }

.controls { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
.tab {
  padding: 8px 12px;
  border: 1px solid #ccc;
  background: #fff;
  color: #555;
  cursor: pointer;
  font-size: 10px;
  line-height: 1.4;
  text-align: center;
  border-radius: 4px;
  transition: all 0.15s;
  min-width: 72px;
}
body.dark .tab { background: #222; color: #aaa; border-color: #444; }
.tab.active { background: #111; color: #fff; border-color: #111; }
body.dark .tab.active { background: #F9F8F6; color: #111; border-color: #F9F8F6; }

.toggle-row {
  display: flex;
  gap: 20px;
  margin-bottom: 32px;
  flex-wrap: wrap;
  align-items: center;
}
.toggle-label {
  font-size: 13px;
  color: #555;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-family: sans-serif;
  transition: color 0.3s;
}
body.dark .toggle-label { color: #aaa; }
.toggle-label input { cursor: pointer; width: 16px; height: 16px; }

.darkmode-btn {
  margin-left: auto;
  padding: 8px 16px;
  border: 1px solid #ccc;
  background: #fff;
  color: #555;
  cursor: pointer;
  font-size: 12px;
  border-radius: 4px;
  font-family: sans-serif;
  transition: all 0.15s;
}
body.dark .darkmode-btn { background: #222; color: #aaa; border-color: #444; }

.legend {
  display: flex;
  gap: 16px;
  margin-bottom: 32px;
  padding: 12px 16px;
  background: #eee;
  border-radius: 4px;
  flex-wrap: wrap;
  font-family: sans-serif;
  font-size: 12px;
  color: #555;
  transition: background 0.3s, color 0.3s;
}
body.dark .legend { background: #222; color: #aaa; }
.legend strong { color: #111; }
body.dark .legend strong { color: #F9F8F6; }

.panel { display: none; }
.panel.active { display: block; }

.type-section {
  border-bottom: 1px solid #ddd;
  padding: 20px 0;
  transition: border-color 0.3s;
}
body.dark .type-section { border-bottom-color: #333; }
.type-section:last-child { border-bottom: none; }

.type-meta { font-size: 11px; color: #aaa; margin-bottom: 8px; font-family: monospace; }
body.dark .type-meta { color: #555; }

.type-swatch { padding: 6px 0; }

.type-tag { font-size: 11px; color: #aaa; margin-top: 6px; font-family: sans-serif; }
body.dark .type-tag { color: #555; }
</style>
</head>
<body>

<div class="controls">
  <button class="tab active" onclick="setPanel('1')">1<br><span style="font-size:9px;opacity:.7">Kulturista<br>serifada</span></button>
  <button class="tab" onclick="setPanel('2')">2<br><span style="font-size:9px;opacity:.7">Cormorant<br>serifada</span></button>
  <button class="tab" onclick="setPanel('3')">3<br><span style="font-size:9px;opacity:.7">Neue Haas<br>sans premium</span></button>
  <button class="tab" onclick="setPanel('4')">4<br><span style="font-size:9px;opacity:.7">Futura PT<br>geométrica</span></button>
  <button class="tab" onclick="setPanel('5')">5<br><span style="font-size:9px;opacity:.7">DM Sans<br>humanista</span></button>
  <button class="tab" onclick="setPanel('6')">6<br><span style="font-size:9px;opacity:.7">Jost<br>geométrica</span></button>
  <button class="tab" onclick="setPanel('7')">7<br><span style="font-size:9px;opacity:.7">Open Sans<br>humanista</span></button>
  <button class="tab" onclick="setPanel('8')">8<br><span style="font-size:9px;opacity:.7">Plus Jakarta<br>moderna</span></button>
</div>

<div class="toggle-row">
  <label class="toggle-label">
    <input type="checkbox" id="toggle-uppercase-title" onchange="rebuildAll()">
    uppercase títulos
  </label>
  <label class="toggle-label">
    <input type="checkbox" id="toggle-uppercase-body" onchange="rebuildAll()">
    uppercase textos
  </label>
  <label class="toggle-label">
    <input type="checkbox" id="toggle-spacing" checked onchange="rebuildAll()">
    letter-spacing generoso
  </label>
  <button class="darkmode-btn" onclick="toggleDark()" id="darkbtn">☽ dark mode</button>
</div>

<div class="legend">
  <div><strong>1/2</strong> — Serifadas elegantes</div>
  <div><strong>3/4</strong> — Sans-serif premium (Adobe)</div>
  <div><strong>5/6/7/8</strong> — Sans-serif (Google Fonts)</div>
</div>

<div id="panel-1" class="panel active"></div>
<div id="panel-2" class="panel"></div>
<div id="panel-3" class="panel"></div>
<div id="panel-4" class="panel"></div>
<div id="panel-5" class="panel"></div>
<div id="panel-6" class="panel"></div>
<div id="panel-7" class="panel"></div>
<div id="panel-8" class="panel"></div>

<script>
const combos = {
  '1':  { font: '"kulturista-web", serif',               titleWeight: 300, bodyWeight: 300 },
  '2':  { font: '"Cormorant Garamond", serif',           titleWeight: 300, bodyWeight: 400 },
  '3':  { font: '"neue-haas-grotesk-display", sans-serif', titleWeight: 300, bodyWeight: 400 },
  '4':  { font: '"futura-pt", sans-serif',               titleWeight: 300, bodyWeight: 400 },
  '5':  { font: '"DM Sans", sans-serif',                 titleWeight: 300, bodyWeight: 400 },
  '6':  { font: '"Jost", sans-serif',                    titleWeight: 300, bodyWeight: 400 },
  '7':  { font: '"Open Sans", sans-serif',               titleWeight: 300, bodyWeight: 400 },
  '8':  { font: '"Plus Jakarta Sans", sans-serif',       titleWeight: 300, bodyWeight: 400 },
};

const hierarchy = [
  { tag: 'h1', label: 'H1 — Título principal', size: '32px', weight: 'title', text: 'Onde a moda encontra a arte', ls: '0.04em' },
  { tag: 'h2', label: 'H2 — Título de seção', size: '24px', weight: 'title', text: 'Coleção Wasabi', ls: '0.04em' },
  { tag: 'h3', label: 'H3 — Subtítulo', size: '18px', weight: 'title', text: 'Peça destaque da temporada', ls: '0.03em' },
  { tag: 'h4', label: 'H4 — Título menor', size: '15px', weight: 'title', text: 'Junte-se à nossa lista', ls: '0.02em' },
  { tag: 'h5', label: 'H5 — Label de categoria', size: '12px', weight: 'body', text: 'Processo criativo', ls: '0.08em' },
  { tag: 'h6', label: 'H6 — Detalhe mínimo', size: '11px', weight: 'body', text: 'Editorial', ls: '0.1em' },
  { tag: 'p', label: 'P — Parágrafo', size: '14px', weight: 'body', text: 'Topan lab é o laboratório de formas, moda como arte, beleza autêntica. Cada peça é uma pesquisa de modelagem, silhueta e matéria-prima.', ls: '0.02em' },
  { tag: 'a', label: 'A — Link de navegação', size: '12px', weight: 'body', text: 'ver coleção', ls: '0.06em' },
  { tag: 'button', label: 'Button — Botão de ação', size: '12px', weight: 'body', text: 'shop now', ls: '0.1em' },
  { tag: 'li', label: 'LI — Item de menu', size: '11px', weight: 'body', text: 'coleções · peça única · conjuntos · sale', ls: '0.08em' },
  { tag: 'small', label: 'Small — Texto auxiliar', size: '11px', weight: 'body', text: 'frete cortesia a partir de R$1.500,00', ls: '0.04em' },
  { tag: 'label', label: 'Label — Formulário', size: '11px', weight: 'body', text: 'seu endereço de e-mail', ls: '0.06em' },
];

const keys = ['1','2','3','4','5','6','7','8'];
let isDark = false;

function getTextColor() { return isDark ? '#F9F8F6' : '#111'; }

function buildPanel(key) {
  const combo = combos[key];
  const container = document.getElementById('panel-' + key);
  const ucTitle = document.getElementById('toggle-uppercase-title').checked;
  const ucBody = document.getElementById('toggle-uppercase-body').checked;
  const spacingOn = document.getElementById('toggle-spacing').checked;
  container.innerHTML = '';

  hierarchy.forEach(item => {
    const isTitle = item.weight === 'title';
    const fontWeight = isTitle ? combo.titleWeight : combo.bodyWeight;
    const textTransform = (isTitle && ucTitle) || (!isTitle && ucBody) ? 'uppercase' : 'none';
    const ls = spacingOn ? item.ls : 'normal';

    const section = document.createElement('div');
    section.className = 'type-section';

    const meta = document.createElement('div');
    meta.className = 'type-meta';
    meta.textContent = combo.font.split(',')[0] + ' · ' + item.size + ' · weight ' + fontWeight;

    const swatch = document.createElement('div');
    swatch.className = 'type-swatch';
    swatch.style.fontFamily = combo.font;
    swatch.style.fontSize = item.size;
    swatch.style.fontWeight = fontWeight;
    swatch.style.textTransform = textTransform;
    swatch.style.letterSpacing = ls;
    swatch.style.lineHeight = isTitle ? '1.2' : '1.7';
    swatch.style.color = getTextColor();
    swatch.textContent = item.text;

    const tagEl = document.createElement('div');
    tagEl.className = 'type-tag';
    tagEl.textContent = item.label;

    section.appendChild(meta);
    section.appendChild(swatch);
    section.appendChild(tagEl);
    container.appendChild(section);
  });
}

function rebuildAll() { keys.forEach(buildPanel); }

function setPanel(key) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + key).classList.add('active');
  document.querySelectorAll('.tab')[keys.indexOf(key)].classList.add('active');
}

function toggleDark() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  document.getElementById('darkbtn').textContent = isDark ? '☀ light mode' : '☽ dark mode';
  rebuildAll();
}

rebuildAll();
</script>
</body>
</html>
