<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topan — Combinações Tipográficas</title>
<link rel="stylesheet" href="https://use.typekit.net/uyh8pui.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400&family=Plus+Jakarta+Sans:wght@300;400&family=DM+Sans:wght@300;400&family=Jost:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #F9F8F6;
  color: #111;
  font-family: sans-serif;
  padding: 32px;
  transition: background 0.3s, color 0.3s;
}
body.dark { background: #111; color: #F9F8F6; }

h1.page-title {
  font-family: sans-serif;
  font-size: 13px;
  font-weight: 400;
  color: #aaa;
  margin-bottom: 8px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
body.dark h1.page-title { color: #555; }

.group-title {
  font-family: sans-serif;
  font-size: 11px;
  font-weight: 400;
  color: #aaa;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin: 32px 0 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid #ddd;
}
body.dark .group-title { color: #555; border-bottom-color: #333; }

.controls { display: flex; gap: 6px; margin-bottom: 28px; flex-wrap: wrap; }
.tab {
  padding: 7px 12px;
  border: 1px solid #ccc;
  background: #fff;
  color: #555;
  cursor: pointer;
  font-size: 10px;
  line-height: 1.5;
  text-align: center;
  border-radius: 4px;
  transition: all 0.15s;
  min-width: 80px;
}
body.dark .tab { background: #1a1a1a; color: #888; border-color: #333; }
.tab.active { background: #111; color: #fff; border-color: #111; }
body.dark .tab.active { background: #F9F8F6; color: #111; border-color: #F9F8F6; }
.tab small { display: block; font-size: 9px; opacity: .6; margin-top: 2px; }

.toggle-row {
  display: flex;
  gap: 20px;
  margin-bottom: 32px;
  flex-wrap: wrap;
  align-items: center;
}
.toggle-label {
  font-size: 12px;
  color: #555;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-family: sans-serif;
}
body.dark .toggle-label { color: #888; }
.toggle-label input { cursor: pointer; width: 14px; height: 14px; }

.darkmode-btn {
  margin-left: auto;
  padding: 7px 14px;
  border: 1px solid #ccc;
  background: #fff;
  color: #555;
  cursor: pointer;
  font-size: 11px;
  border-radius: 4px;
  font-family: sans-serif;
}
body.dark .darkmode-btn { background: #1a1a1a; color: #888; border-color: #333; }

.panel { display: none; }
.panel.active { display: block; }

.type-section { border-bottom: 1px solid #e8e8e8; padding: 18px 0; }
body.dark .type-section { border-bottom-color: #2a2a2a; }
.type-section:last-child { border-bottom: none; }

.type-meta { font-size: 10px; color: #bbb; margin-bottom: 6px; font-family: monospace; }
body.dark .type-meta { color: #444; }

.type-swatch { padding: 4px 0; }
.type-tag { font-size: 10px; color: #bbb; margin-top: 4px; font-family: sans-serif; }
body.dark .type-tag { color: #444; }

.ref-badge {
  display: inline-block;
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 3px;
  margin-bottom: 20px;
  font-family: sans-serif;
}
.ref-paula { background: #f0ece8; color: #888; }
.ref-farfetch { background: #e8ecf0; color: #888; }
body.dark .ref-paula { background: #2a2520; color: #666; }
.ref-cris { background: #edf0e8; color: #888; }
body.dark .ref-cris { background: #202820; color: #666; }
</style>
</head>
<body>

<h1 class="page-title">Topan by Laura — Combinações Tipográficas</h1>

<div class="group-title">Padrão Paula Raia — serifada nos títulos + sans no corpo</div>
<div class="controls" id="controls-paula"></div>

<div class="group-title">Padrão Farfetch — sans nos títulos + serifada no corpo</div>
<div class="controls" id="controls-farfetch"></div>

<div class="group-title">Padrão Cris Barros — fonte única, uppercase seletivo</div>
<div class="controls" id="controls-cris"></div>

<div class="toggle-row">
  <label class="toggle-label"><input type="checkbox" id="uc-title" onchange="rebuildAll()"> uppercase títulos</label>
  <label class="toggle-label"><input type="checkbox" id="uc-body" onchange="rebuildAll()"> uppercase textos</label>
  <label class="toggle-label"><input type="checkbox" id="spacing" checked onchange="rebuildAll()"> letter-spacing</label>
  <button class="darkmode-btn" onclick="toggleDark()" id="darkbtn">☽ dark mode</button>
</div>

<div id="panels"></div>

<script>
const combos = [
  // Paula Raia — serifada títulos + sans corpo
  { id:'A', group:'paula', label:'Kulturista', sub:'+ Open Sans',   heading:'"kulturista-web", serif',          body:'"Open Sans", sans-serif',        hw:300, bw:400 },
  { id:'B', group:'paula', label:'Kulturista', sub:'+ DM Sans',     heading:'"kulturista-web", serif',          body:'"DM Sans", sans-serif',           hw:300, bw:400 },
  { id:'C', group:'paula', label:'Kulturista', sub:'+ Jost',        heading:'"kulturista-web", serif',          body:'"Jost", sans-serif',              hw:300, bw:400 },
  { id:'D', group:'paula', label:'Kulturista', sub:'+ Plus Jakarta', heading:'"kulturista-web", serif',         body:'"Plus Jakarta Sans", sans-serif',  hw:300, bw:400 },
  { id:'E', group:'paula', label:'Cormorant',  sub:'+ Open Sans',   heading:'"Cormorant Garamond", serif',      body:'"Open Sans", sans-serif',        hw:300, bw:400 },
  { id:'F', group:'paula', label:'Cormorant',  sub:'+ DM Sans',     heading:'"Cormorant Garamond", serif',      body:'"DM Sans", sans-serif',           hw:300, bw:400 },
  { id:'G', group:'paula', label:'Cormorant',  sub:'+ Jost',        heading:'"Cormorant Garamond", serif',      body:'"Jost", sans-serif',              hw:300, bw:400 },
  { id:'H', group:'paula', label:'Cormorant',  sub:'+ Plus Jakarta', heading:'"Cormorant Garamond", serif',     body:'"Plus Jakarta Sans", sans-serif',  hw:300, bw:400 },
  // Farfetch — sans títulos + serifada corpo
  { id:'I', group:'farfetch', label:'Neue Haas', sub:'+ Cormorant',  heading:'"neue-haas-grotesk-display", sans-serif', body:'"Cormorant Garamond", serif', hw:400, bw:400 },
  { id:'J', group:'farfetch', label:'Neue Haas', sub:'+ Kulturista', heading:'"neue-haas-grotesk-display", sans-serif', body:'"kulturista-web", serif',    hw:400, bw:300 },
  { id:'K', group:'farfetch', label:'DM Sans',   sub:'+ Cormorant',  heading:'"DM Sans", sans-serif',                  body:'"Cormorant Garamond", serif', hw:400, bw:400 },
  { id:'L', group:'farfetch', label:'Jost',      sub:'+ Cormorant',  heading:'"Jost", sans-serif',                     body:'"Cormorant Garamond", serif', hw:400, bw:400 },
  // Cris Barros — fonte única, uppercase seletivo h2/h3/h4, tamanhos maiores no corpo
  { id:'M', group:'cris', label:'Futura PT',    sub:'só geométrica',  heading:'"futura-pt", sans-serif',                body:'"futura-pt", sans-serif',     hw:400, bw:400 },
  { id:'N', group:'cris', label:'Neue Haas',    sub:'só sans premium', heading:'"neue-haas-grotesk-display", sans-serif', body:'"neue-haas-grotesk-display", sans-serif', hw:400, bw:400 },
  { id:'O', group:'cris', label:'DM Sans',      sub:'só humanista',   heading:'"DM Sans", sans-serif',                  body:'"DM Sans", sans-serif',       hw:400, bw:400 },
  { id:'P', group:'cris', label:'Jost',         sub:'só geométrica',  heading:'"Jost", sans-serif',                     body:'"Jost", sans-serif',          hw:400, bw:400 },
  { id:'Q', group:'cris', label:'Plus Jakarta', sub:'só moderna',     heading:'"Plus Jakarta Sans", sans-serif',        body:'"Plus Jakarta Sans", sans-serif', hw:400, bw:400 },
];

// Paula Raia hierarchy — serifada h2/h3, sans no resto
const hierPaula = [
  { tag:'h1', label:'H1 — Título principal',   size:'18px', font:'body',    weight:'bw',  text:'Onde a moda encontra a arte',              ls:'0.04em', uc:false },
  { tag:'h2', label:'H2 — Título de seção',    size:'17px', font:'heading', weight:'hw',  text:'Coleção Wasabi',                           ls:'0.18em', uc:false },
  { tag:'h3', label:'H3 — Subtítulo',          size:'18px', font:'heading', weight:'hw',  text:'Peça destaque da temporada',               ls:'0.04em', uc:true  },
  { tag:'h4', label:'H4 — Título menor',       size:'12px', font:'body',    weight:'bw',  text:'Junte-se à nossa lista',                   ls:'normal', uc:false },
  { tag:'p',  label:'P — Parágrafo',           size:'12px', font:'body',    weight:'bw',  text:'Topan lab é o laboratório de formas, moda como arte, beleza autêntica. Cada peça é uma pesquisa de modelagem, silhueta e matéria-prima.', ls:'0.16em', uc:true  },
  { tag:'a',  label:'A — Link de navegação',   size:'10px', font:'body',    weight:'bw',  text:'ver coleção',                              ls:'normal', uc:false },
  { tag:'li', label:'LI — Item de menu',       size:'10px', font:'body',    weight:'bw',  text:'coleções · peça única · conjuntos · sale', ls:'0.5em',  uc:true  },
  { tag:'button', label:'Button — Botão',      size:'13px', font:'body',    weight:'bw',  text:'shop now',                                 ls:'normal', uc:false },
  { tag:'small',  label:'Small — Auxiliar',    size:'11px', font:'body',    weight:'bw',  text:'frete cortesia a partir de R$1.500,00',    ls:'0.04em', uc:false },
];

// Farfetch hierarchy — sans títulos grandes, serifada no corpo
const hierFarfetch = [
  { tag:'h2',    label:'H2 — Título principal', size:'32px', font:'heading', weight:'hw', text:'Onde a moda encontra a arte',              ls:'normal', uc:false },
  { tag:'h3',    label:'H3 — Título de seção',  size:'24px', font:'heading', weight:'hw', text:'Coleção Wasabi',                           ls:'normal', uc:false },
  { tag:'p',     label:'P — Parágrafo',         size:'16px', font:'body',    weight:'bw', text:'Topan lab é o laboratório de formas, moda como arte, beleza autêntica. Cada peça é uma pesquisa de modelagem, silhueta e matéria-prima.', ls:'normal', uc:false },
  { tag:'a',     label:'A — Link',              size:'13px', font:'heading', weight:'700', text:'ver coleção',                             ls:'normal', uc:false },
  { tag:'li',    label:'LI — Item de menu',     size:'13px', font:'heading', weight:'hw', text:'coleções · peça única · conjuntos · sale', ls:'normal', uc:false },
  { tag:'button',label:'Button — Botão',        size:'14px', font:'heading', weight:'700', text:'shop now',                                ls:'normal', uc:false },
  { tag:'label', label:'Label — Formulário',    size:'13px', font:'heading', weight:'hw', text:'seu endereço de e-mail',                  ls:'normal', uc:false },
  { tag:'small', label:'Small — Auxiliar',      size:'11px', font:'heading', weight:'hw', text:'frete cortesia a partir de R$1.500,00',   ls:'normal', uc:false },
];

// Cris Barros hierarchy — fonte única, uppercase só h2/h3/h4, tamanhos maiores no corpo
const hierCris = [
  { tag:'h2',    label:'H2 — Título principal', size:'20px', font:'heading', weight:'hw',  text:'Onde a moda encontra a arte',              ls:'normal', uc:true  },
  { tag:'h3',    label:'H3 — Subtítulo',        size:'16px', font:'heading', weight:'hw',  text:'Peça destaque da temporada',               ls:'normal', uc:true  },
  { tag:'h4',    label:'H4 — Título menor',     size:'16px', font:'heading', weight:'hw',  text:'Junte-se à nossa lista',                   ls:'normal', uc:true  },
  { tag:'p',     label:'P — Parágrafo',         size:'14px', font:'body',    weight:'bw',  text:'Topan lab é o laboratório de formas, moda como arte, beleza autêntica. Cada peça é uma pesquisa de modelagem, silhueta e matéria-prima.', ls:'normal', uc:false },
  { tag:'a',     label:'A — Link de navegação', size:'14px', font:'body',    weight:'bw',  text:'ver coleção',                              ls:'normal', uc:false },
  { tag:'li',    label:'LI — Item de menu',     size:'16px', font:'body',    weight:'bw',  text:'coleções · peça única · conjuntos · sale', ls:'normal', uc:false },
  { tag:'button',label:'Button — Botão',        size:'13px', font:'body',    weight:'bw',  text:'shop now',                                 ls:'normal', uc:false },
  { tag:'label', label:'Label — Formulário',    size:'16px', font:'body',    weight:'bw',  text:'seu endereço de e-mail',                   ls:'normal', uc:false },
  { tag:'small', label:'Small — Auxiliar',      size:'12px', font:'body',    weight:'bw',  text:'frete cortesia a partir de R$1.500,00',    ls:'normal', uc:false },
];
let isDark = false;
let activePanel = 'A';

function getTextColor() { return isDark ? '#F9F8F6' : '#111'; }

function buildControls() {
  const cpPaula = document.getElementById('controls-paula');
  const cpFarfetch = document.getElementById('controls-farfetch');
  const cpCris = document.getElementById('controls-cris');
  combos.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (c.id === activePanel ? ' active' : '');
    btn.innerHTML = `${c.id}<small>${c.label}<br>${c.sub}</small>`;
    btn.onclick = () => setPanel(c.id);
    if (c.group === 'paula') cpPaula.appendChild(btn);
    else if (c.group === 'farfetch') cpFarfetch.appendChild(btn);
    else cpCris.appendChild(btn);
  });
}

function buildAllPanels() {
  const container = document.getElementById('panels');
  container.innerHTML = '';
  combos.forEach(c => {
    const panel = document.createElement('div');
    panel.id = 'panel-' + c.id;
    panel.className = 'panel' + (c.id === activePanel ? ' active' : '');

    const badge = document.createElement('div');
    badge.className = 'ref-badge ref-' + c.group;
    badge.textContent = c.group === 'paula'
      ? 'Estilo Paula Raia — serifada títulos + sans corpo'
      : c.group === 'farfetch'
      ? 'Estilo Farfetch — sans títulos + serifada corpo'
      : 'Estilo Cris Barros — fonte única, uppercase seletivo';
    panel.appendChild(badge);

    const hier = c.group === 'paula' ? hierPaula : c.group === 'farfetch' ? hierFarfetch : hierCris;
    const ucTitle = document.getElementById('uc-title').checked;
    const ucBody = document.getElementById('uc-body').checked;
    const spacingOn = document.getElementById('spacing').checked;

    hier.forEach(item => {
      const isHeading = item.font === 'heading';
      const fontFamily = isHeading ? c.heading : c.body;
      const fw = item.weight === 'hw' ? c.hw : item.weight === 'bw' ? c.bw : item.weight;
      const defaultUc = item.uc;
      const uc = isHeading ? (ucTitle || defaultUc) : (ucBody || defaultUc);
      const ls = spacingOn ? item.ls : 'normal';

      const section = document.createElement('div');
      section.className = 'type-section';

      const meta = document.createElement('div');
      meta.className = 'type-meta';
      meta.textContent = fontFamily.split(',')[0] + ' · ' + item.size + ' · weight ' + fw;

      const swatch = document.createElement('div');
      swatch.className = 'type-swatch';
      swatch.style.fontFamily = fontFamily;
      swatch.style.fontSize = item.size;
      swatch.style.fontWeight = fw;
      swatch.style.textTransform = uc ? 'uppercase' : 'none';
      swatch.style.letterSpacing = ls;
      swatch.style.lineHeight = isHeading ? '1.2' : '1.7';
      swatch.style.color = getTextColor();
      swatch.textContent = item.text;

      const tag = document.createElement('div');
      tag.className = 'type-tag';
      tag.textContent = item.label;

      section.appendChild(meta);
      section.appendChild(swatch);
      section.appendChild(tag);
      panel.appendChild(section);
    });

    container.appendChild(panel);
  });
}

function rebuildAll() { buildAllPanels(); }

function setPanel(id) {
  activePanel = id;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('panel-' + id);
  if (panel) panel.classList.add('active');
  document.querySelectorAll('.tab').forEach(t => {
    if (t.textContent.trim().startsWith(id)) t.classList.add('active');
  });
}

function toggleDark() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  document.getElementById('darkbtn').textContent = isDark ? '☀ light mode' : '☽ dark mode';
  rebuildAll();
}

buildControls();
buildAllPanels();
</script>
</body>
</html>
